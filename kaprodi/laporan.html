<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Capaian OBE - Universitas AKI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --navy: #0f172a; --blue: #1e3a8a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 24px; }
        h2 { color: var(--navy); display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .select-mk { width: 100%; max-width: 400px; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 20px; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; color: #475569; padding: 12px; text-align: left; font-size: 0.85rem; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }
        .badge { padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.75rem; }
        .success { background: #dcfce7; color: #166534; }
        .danger { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2><i class="fas fa-chart-pie"></i> Laporan Capaian Pembelajaran Lulusan (CPL)</h2>
            <p style="color:#64748b; margin-bottom:15px;">Pilih mata kuliah untuk melihat visualisasi pencapaian</p>
            <select id="pilihMK" class="select-mk" onchange="loadLaporan()">
                <option value="" disabled selected>Memuat Mata Kuliah...</option>
            </select>
        </div>
        
        <div class="grid">
            <div class="card"><canvas id="radarCPL"></canvas></div>
            <div class="card">
                <h3>Evaluasi & Tindak Lanjut</h3>
                <table>
                    <thead>
                        <tr><th>Kode CPL</th><th>Rata-rata</th><th>Status</th><th>Tindak Lanjut</th></tr>
                    </thead>
                    <tbody id="evalBody">
                        <tr><td colspan="4" style="text-align:center; padding:40px; color:#94a3b8;">Pilih mata kuliah terlebih dahulu</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_METADATA = "https://viewed-picked-sprint-includes.trycloudflare.com/webhook/get-metadata";
        const API_GET_REPORT = "https://viewed-picked-sprint-includes.trycloudflare.com/webhook/get-report-obe";
        const userNidn = localStorage.getItem("user_nidn");
        const userProdi = localStorage.getItem("prodi_aktif") || "ti";

        // 1. Memuat daftar MK ke dropdown agar "Master MK Baru" muncul
        async function loadMetadata() {
            const selectMK = document.getElementById('pilihMK');
            try {
                const res = await fetch(`${API_METADATA}?prodi=${userProdi}&context=dosen&nidn=${userNidn}`);
                const data = await res.json();
                selectMK.innerHTML = '<option value="" disabled selected>Pilih Mata Kuliah</option>';
                data.filter(item => item.tipe === 'mk').forEach(mk => {
                    const opt = document.createElement('option');
                    opt.value = mk.kode;
                    opt.textContent = `[${mk.kode}] ${mk.label}`;
                    selectMK.appendChild(opt);
                });
            } catch (e) { selectMK.innerHTML = '<option>Gagal memuat data</option>'; }
        }

        // 2. Mengambil data capaian CPL asli dari n8n
        async function loadLaporan() {
            const mkKode = document.getElementById("pilihMK").value;
            if(!mkKode) return;

            try {
                const res = await fetch(`${API_GET_REPORT}?mk=${mkKode}`);
                const data = await res.json();
                renderChart(data);
                renderTable(data);
            } catch (e) { console.error("Gagal memuat laporan"); }
        }

        function renderChart(data) {
            const ctx = document.getElementById('radarCPL').getContext('2d');
            if(window.myRadarChart) window.myRadarChart.destroy();
            window.myRadarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: data.map(d => d.kode_cpl),
                    datasets: [{
                        label: 'Capaian Riil (%)',
                        data: data.map(d => parseFloat(d.rata_rata).toFixed(2)),
                        backgroundColor: 'rgba(30, 58, 138, 0.2)',
                        borderColor: '#1e3a8a'
                    }, {
                        label: 'Target (75%)',
                        data: data.map(() => 75),
                        borderColor: '#f97316',
                        borderDash: [5, 5],
                        fill: false
                    }]
                },
                options: { scales: { r: { min: 0, max: 100 } } }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById("evalBody");
            tbody.innerHTML = "";
            data.forEach(d => {
                const nilai = parseFloat(d.rata_rata).toFixed(2);
                const isLulus = nilai >= 75;
                tbody.innerHTML += `<tr>
                    <td><b>${d.kode_cpl}</b></td>
                    <td>${nilai}%</td>
                    <td><span class="badge ${isLulus ? 'success' : 'danger'}">${isLulus ? 'TERCAPAI' : 'DI BAWAH TARGET'}</span></td>
                    <td><textarea style="width:100%; border-radius:4px; border:1px solid #ddd;"></textarea></td>
                </tr>`;
            });
        }

        window.onload = loadMetadata;
    </script>
</body>
</html>
