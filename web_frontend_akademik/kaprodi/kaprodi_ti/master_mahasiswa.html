<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mahasiswa - Sistem OBE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- VARIABEL WARNA --- */
        :root { 
            --sidebar-bg: #161923; 
            --sidebar-text: #7b8395;
            --sidebar-hover: #262936;
            --sidebar-active-text: #ffffff;
            --primary-red: #8b0000; 
            --bg-main: #ffffff; 
            --text-dark: #111827;
            --border-light: #e5e7eb;
            --border-dark: #161923;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            display: flex; background: var(--bg-main); height: 100vh; overflow: hidden; color: var(--text-dark);
            animation: transitionIn 0.3s ease-in-out; 
        }
        
        @keyframes transitionIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- GAYA SIDEBAR --- */
        .sidebar { width: 280px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; padding: 24px 16px; min-height: 100vh; }
        .sidebar-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; padding: 0 10px; }
        .sidebar-profile img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .sidebar-profile-info { display: flex; flex-direction: column; }
        .sidebar-profile-info .name { color: white; font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
        .sidebar-profile-info .role { color: var(--sidebar-text); font-size: 9px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
        .sidebar-divider { height: 1px; background-color: rgba(255, 255, 255, 0.08); margin: 5px 10px 10px 10px; }
        .nav-menu { flex: 1; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .nav-menu::-webkit-scrollbar { display: none; }
        .menu-category { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; color: var(--sidebar-text); text-transform: uppercase; margin: 10px 0 10px 10px; }
        .nav-item { padding: 12px 16px; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: all 0.2s; border-radius: 8px; font-weight: 500; font-size: 0.80rem; }
        .nav-item:hover, .nav-item.active { background: var(--sidebar-hover); color: var(--sidebar-active-text); }
        .nav-item i { font-size: 1.1rem; width: 20px; text-align: center; }
        .nav-bottom { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .nav-item.logout { color: #f87171; }
        .nav-item.logout:hover { background: rgba(248, 113, 113, 0.1); }
        #menu-master .nav-item { padding-left: 20px; font-size: 0.75rem; }

        /* --- GAYA KONTEN UTAMA --- */
        .main-content { flex: 1; overflow-y: auto; padding: 40px 60px; }

        .header-container { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; border-bottom: 1px solid #e5e7eb; padding-bottom: 20px; }
        .header-subtitle { color: #9ca3af; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .header-title { font-size: 2.2rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px;}
        .header-title span { color: var(--primary-red); }
        .badge-prodi { background: var(--primary-red); color: white; padding: 10px 20px; border-radius: 30px; font-size: 0.9rem; font-weight: 600; }

        /* --- TOMBOL --- */
        .btn-dark { background: var(--border-dark); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-dark:hover { background: #000000; transform: translateY(-2px); }
        .btn-primary-red { background: var(--primary-red); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-primary-red:hover { background: #660000; transform: translateY(-2px); }

        /* --- GAYA TABEL --- */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; border: 1.5px solid #e5e7eb; border-radius: 8px; overflow: hidden; background: white; }
        th { background: #f3f4f6; color: var(--text-dark); padding: 14px 16px; text-align: left; border-bottom: 2px solid #e5e7eb; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; }
        td { padding: 14px 16px; border-bottom: 1px solid #e5e7eb; font-size: 0.95rem; }
        tbody tr:hover { background-color: #f9fafb; }
        
        .btn-action { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; color: white; transition: 0.2s; }
        .btn-edit { background: #f59e0b; }
        .btn-edit:hover { background: #d97706; }
        .btn-delete { background: #ef4444; }
        .btn-delete:hover { background: #dc2626; }

        .badge-status { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; display: inline-block; }
        .status-aktif { background: #d1fae5; color: #065f46; }
        .status-cuti { background: #fef08a; color: #854d0e; }
        .status-lulus { background: #dbeafe; color: #1e40af; }

        /* --- MODAL POP-UP STYLES --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; animation: fadeIn 0.2s ease; }
        .modal-box { background: white; padding: 32px; border-radius: 16px; width: 450px; max-width: 90%; border: 2.5px solid var(--border-dark); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; color: var(--text-dark); }
        .form-control { width: 100%; padding: 12px 16px; border: 1.5px solid #d1d5db; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .form-control:focus { border-color: var(--border-dark); }
    </style>
</head>
<body>

    <!-- Wadah Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Konten Utama -->
    <div class="main-content">
        
        <div class="header-container">
            <div class="header-title-area">
                <div class="header-subtitle">KELOLA KURIKULUM</div>
                <h1 class="header-title">DATA <span>MAHASISWA</span></h1>
            </div>
            <div class="badge-prodi">Teknik Informatika</div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <div>
                <h3 style="margin: 0; font-size: 1.4rem; font-weight: 800;">Daftar Mahasiswa</h3>
                <p style="margin: 4px 0 0 0; color: #9ca3af; font-size: 0.95rem; font-weight: 500;">Kelola data induk mahasiswa Teknik Informatika.</p>
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="btn-primary-red" onclick="bukaModalMahasiswa()"><i class="fas fa-plus"></i> Tambah</button>
                <button class="btn-dark" onclick="loadData()"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <div style="display: flex; align-items: center; gap: 8px; color: #4b5563; font-size: 0.9rem;">
                Show 
                <select id="showEntries" style="padding: 6px 10px; border: 1.5px solid #d1d5db; border-radius: 6px; outline: none; cursor: pointer;">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="25">25</option>
                </select> entries
            </div>
            
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="font-size: 0.9rem; font-weight: 600; color: #4b5563;">Search:</label>
                <input type="text" id="searchBox" placeholder="Cari NIM atau Nama..." style="padding: 8px 12px; border: 1.5px solid #d1d5db; border-radius: 6px; outline: none; font-size: 0.9rem;">
            </div>
        </div>

        <!-- Tabel Data -->
        <table>
            <thead>
                <tr>
                    <th width="5%" style="text-align: center;">No</th>
                    <th width="15%">NIM</th>
                    <th>Nama Mahasiswa</th>
                    <th width="15%" style="text-align: center;">Angkatan</th>
                    <th width="15%" style="text-align: center;">Status</th>
                    <th width="20%" style="text-align: center;">Opsi</th>
                </tr>
            </thead>
            <tbody id="bodyMahasiswa">
                <!-- Data API masuk ke sini -->
            </tbody>
        </table>

        <div id="pagination-mahasiswa" style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; font-size: 0.85rem; color: #6b7280;">
            <div>Loading entries...</div>
        </div>
    </div>

    <!-- Modal Pop-Up Tambah Mahasiswa -->
    <div id="modalMahasiswa" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitleMahasiswa" style="margin-top: 0; margin-bottom: 20px; color: var(--text-dark); font-size: 1.4rem; font-weight: 800;">Tambah Mahasiswa</h3>
            
            <input type="hidden" id="idMahasiswa">
            
            <div class="form-group">
                <label>NIM</label>
                <input type="text" id="inputNIM" class="form-control" placeholder="Contoh: 22.11.1234">
            </div>
            
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="inputNamaMahasiswa" class="form-control" placeholder="Nama lengkap mahasiswa">
            </div>
            
            <div class="form-group">
                <label>Angkatan (Tahun)</label>
                <input type="number" id="inputAngkatan" class="form-control" placeholder="Contoh: 2022">
            </div>

            <div class="form-group" style="margin-bottom: 30px;">
                <label>Status</label>
                <select id="inputStatusMahasiswa" class="form-control" style="cursor: pointer;">
                    <option value="aktif">Aktif</option>
                    <option value="cuti">Cuti</option>
                    <option value="lulus">Lulus</option>
                </select>
            </div>
            
            <div style="display: flex; justify-content: flex-end; gap: 12px;">
                <button onclick="tutupModalMahasiswa()" style="padding: 12px 18px; border: none; border-radius: 8px; background: #f3f4f6; cursor: pointer; font-weight: 600; color: #4b5563;">Batal</button>
                <button onclick="simpanMahasiswa()" class="btn-dark" style="padding: 12px 18px; border-radius: 8px;"><i class="fas fa-save"></i> Simpan Data</button>
            </div>
        </div>
    </div>

<script>
    // 1. PENGATURAN API N8N
    const PRODI = 'ti'; 
    const API_BASE = "https://reynolds-martial-guild-professional.trycloudflare.com/webhook"; 
    const API_URL = `${API_BASE}/get-metadata?prodi=${PRODI}`; 

    // 2. SISTEM KEAMANAN
    const userLogin = localStorage.getItem("user_login");
    const userRole = localStorage.getItem("user_role");
    const userProdi = localStorage.getItem("prodi_aktif");

    if (!userLogin) window.location.replace("../login/login.html");
    if (userRole !== 'head_admin') {
        if (userRole === 'dosen') window.location.replace(userProdi === 'si' ? "input_nilai_si.html" : "../../dosen/input_nilai.html");
        else if (userRole === 'admin' && userProdi === 'si') window.location.replace("admin_config_si.html");
    }

    // 3. LOAD SIDEBAR
    async function loadSidebar() {
        try {
            const response = await fetch('components/sidebar.html');
            const html = await response.text();
            
            document.getElementById('sidebar-container').outerHTML = html;
            document.getElementById("adminName").innerText = userLogin;
            document.getElementById("sidebarAvatar").src = `https://ui-avatars.com/api/?name=${userLogin}&background=8b0000&color=fff&bold=true`;

            setTimeout(() => {
                const navDashboard = document.getElementById('nav-dashboard');
                const navMahasiswa = document.getElementById('nav-mahasiswa'); // ID Menu Mahasiswa
                const menuMaster = document.getElementById('menu-master');
                const chevronMaster = document.getElementById('chevron-master');

                if(navDashboard) navDashboard.classList.remove('active');
                if(navMahasiswa) navMahasiswa.classList.add('active'); 
                
                if(menuMaster && chevronMaster) {
                    menuMaster.style.display = 'flex';
                    chevronMaster.style.transform = 'rotate(180deg)';
                }
            }, 100);
        } catch (error) { console.error('Gagal memuat sidebar:', error); }
    }

    function toggleDropdown(menuId, chevronId) {
        const menu = document.getElementById(menuId);
        const chevron = document.getElementById(chevronId);
        if (menu.style.display === 'none' || menu.style.display === '') {
            menu.style.display = 'flex'; chevron.style.transform = 'rotate(180deg)'; 
        } else {
            menu.style.display = 'none'; chevron.style.transform = 'rotate(0deg)';   
        }
    }

    function logout() { localStorage.clear(); window.location.replace("login.html"); }

    // ==========================================
    // 4. LOGIKA DATA, PAGINASI, & PENCARIAN MAHASISWA
    // ==========================================
    
    let allDataMahasiswa = []; 
    let currentPage = 1;
    let rowsPerPage = 10;
    let searchQuery = "";

    async function loadData() {
        const tbody = document.getElementById("bodyMahasiswa");
        tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding: 20px;'><i class='fas fa-spinner fa-spin'></i> Sedang memuat data dari database...</td></tr>";

        try {
            const res = await fetch(API_URL);
            const fullData = await res.json();
            
            // Simpan hanya data tipe mahasiswa[cite: 2]
            allDataMahasiswa = fullData.filter(i => i.tipe === 'mahasiswa');
            currentPage = 1;
            
            renderTablePaginated(); 
            
        } catch (error) {
            console.error("Gagal menarik data:", error);
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; color:red; padding: 20px;'>❌ Gagal memuat data dari server n8n.</td></tr>";
        }
    }

    function renderTablePaginated() {
        const tbody = document.getElementById("bodyMahasiswa");
        tbody.innerHTML = ""; 

        // Filter berdasarkan pencarian (NIM atau Nama)
        const filteredData = allDataMahasiswa.filter(item => {
            const nimContent = item.kode ? item.kode.toLowerCase() : "";
            const nameContent = item.label ? item.label.toLowerCase() : "";
            return nimContent.includes(searchQuery) || nameContent.includes(searchQuery);
        });

        if(filteredData.length === 0) {
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding: 20px;'>Data mahasiswa tidak ditemukan.</td></tr>";
            document.getElementById('pagination-mahasiswa').innerHTML = `<div>Showing 0 entries</div>`;
            return;
        }

        const startIndex = (currentPage - 1) * rowsPerPage;
        const endIndex = startIndex + rowsPerPage;
        const dataToShow = filteredData.slice(startIndex, endIndex);

        // Render Data Mahasiswa[cite: 2]
        dataToShow.forEach((item, index) => {
            const noUrut = startIndex + index + 1;
            const parts = item.label ? item.label.split('||') : ['Tidak Diketahui', '-'];
            const namaMhs = parts[0];
            const angkatan = parts[1] || '-';

            tbody.innerHTML += `
            <tr>
                <td style="text-align: center;">${noUrut}</td>
                <td><strong>${item.kode}</strong></td>
                <td style="font-weight: 600;">${namaMhs}</td>
                <td style="text-align: center;">${angkatan}</td>
                <td style="text-align: center;"><span class="badge-status status-aktif">Aktif</span></td>
                <td style="text-align: center;">
                    <button class="btn-action btn-edit" onclick="bukaModalMahasiswa('${item.kode}')"><i class="fas fa-edit"></i> Ubah</button>
                    <button class="btn-action btn-delete" onclick="alert('Fitur hapus disiapkan')"><i class="fas fa-trash"></i> Hapus</button>
                </td>
            </tr>`;
        });

        renderPaginationUI(filteredData.length, startIndex, endIndex);
    }

    function renderPaginationUI(totalFilteredData, startIndex, endIndex) {
        const totalPages = Math.ceil(totalFilteredData / rowsPerPage);
        const actualEndIndex = Math.min(endIndex, totalFilteredData);
        const paginationContainer = document.getElementById('pagination-mahasiswa');
        
        let html = `<div>Showing ${startIndex + 1} to ${actualEndIndex} of ${totalFilteredData} entries</div>`;
        html += `<div style="display: flex; gap: 5px;">`;
        
        const prevDisabled = currentPage === 1;
        html += `<button class="btn" style="background: ${prevDisabled ? '#e5e7eb' : 'var(--text-dark)'}; color: ${prevDisabled ? '#9ca3af' : 'white'}; padding: 8px 12px; border:none; border-radius:8px; cursor:${prevDisabled ? 'not-allowed' : 'pointer'};" ${prevDisabled ? 'disabled' : `onclick="changePage(-1)"`}><i class="fas fa-chevron-left"></i> Prev</button>`;
        
        const nextDisabled = currentPage === totalPages || totalPages === 0;
        html += `<button class="btn" style="background: ${nextDisabled ? '#e5e7eb' : 'var(--text-dark)'}; color: ${nextDisabled ? '#9ca3af' : 'white'}; padding: 8px 12px; border:none; border-radius:8px; cursor:${nextDisabled ? 'not-allowed' : 'pointer'};" ${nextDisabled ? 'disabled' : `onclick="changePage(1)"`}>Next <i class="fas fa-chevron-right"></i></button>`;
        
        html += `</div>`;
        paginationContainer.innerHTML = html;
    }

    function changePage(direction) {
        currentPage += direction;
        renderTablePaginated();
    }

    // ==========================================
    // 5. FUNGSI MODAL POP-UP MAHASISWA[cite: 2]
    // ==========================================
    function bukaModalMahasiswa(nim = '') {
        if(nim) {
            document.getElementById('modalTitleMahasiswa').innerText = "Ubah Data Mahasiswa";
            document.getElementById('inputNIM').value = nim;
            document.getElementById('inputNIM').readOnly = true; 
        } else {
            document.getElementById('modalTitleMahasiswa').innerText = "Tambah Mahasiswa";
            document.getElementById('inputNIM').value = "";
            document.getElementById('inputNIM').readOnly = false;
        }
        
        document.getElementById('idMahasiswa').value = "";
        document.getElementById('inputNamaMahasiswa').value = "";
        document.getElementById('inputAngkatan').value = "";
        document.getElementById('modalMahasiswa').style.display = "flex";
    }

    function tutupModalMahasiswa() {
        document.getElementById('modalMahasiswa').style.display = "none";
    }

    function simpanMahasiswa() {
        alert("Sistem pop-up siap! Data siap dikirim ke webhook n8n.");
        tutupModalMahasiswa();
    }

    // ==========================================
    // 6. EVENT LISTENER SAAT HALAMAN DIBUKA
    // ==========================================
    window.onload = () => { 
        loadSidebar(); 
        loadData(); 
        
        const selectBox = document.getElementById('showEntries');
        if(selectBox) {
            selectBox.onchange = (e) => {
                rowsPerPage = parseInt(e.target.value);
                currentPage = 1; 
                renderTablePaginated();
            }
        }

        const searchBox = document.getElementById('searchBox');
        if(searchBox) {
            searchBox.oninput = (e) => {
                searchQuery = e.target.value.toLowerCase();
                currentPage = 1; 
                renderTablePaginated();
            }
        }
    };
</script>
</body>
</html>
