<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapping CPL - CPMK - Sistem OBE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --sidebar-bg: #161923; --sidebar-text: #7b8395; --sidebar-hover: #262936; --sidebar-active-text: #ffffff;
            --primary-red: #8b0000; --bg-main: #ffffff; --text-dark: #111827; --border-dark: #161923;
        }

        /* --- GAYA SIDEBAR --- */
        .sidebar { width: 280px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; padding: 24px 16px; flex-shrink: 0; }
        .sidebar-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; padding: 0 10px; }
        .sidebar-profile img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .sidebar-profile-info { display: flex; flex-direction: column; }
        .sidebar-profile-info .name { color: white; font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
        .sidebar-profile-info .role { color: var(--sidebar-text); font-size: 9px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
        .sidebar-divider { height: 1px; background-color: rgba(255, 255, 255, 0.08); margin: 5px 10px 10px 10px; }
        .nav-menu { flex: 1; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .nav-menu::-webkit-scrollbar { display: none; }
        .menu-category { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; color: var(--sidebar-text); text-transform: uppercase; margin: 10px 0 10px 10px; }
        .nav-item { padding: 12px 16px; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: all 0.2s; border-radius: 8px; font-weight: 500; font-size: 0.80rem; }
        .nav-item:hover, .nav-item.active { background: var(--sidebar-hover); color: var(--sidebar-active-text); }
        .nav-item i { font-size: 1.1rem; width: 20px; text-align: center; }
        .nav-bottom { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .nav-item.logout { color: #f87171; }
        .nav-item.logout:hover { background: rgba(248, 113, 113, 0.1); }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { display: flex; background: #f9fafb; height: 100vh; overflow: hidden; color: var(--text-dark); animation: transitionIn 0.3s ease-in-out; }
        @keyframes transitionIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .main-content { flex: 1; overflow-y: auto; padding: 40px 60px; }
        .header-container { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; border-bottom: 1px solid #e5e7eb; padding-bottom: 20px; }
        .header-subtitle { color: #9ca3af; font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
        .header-title { font-size: 2.2rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; }
        .header-title span { color: var(--primary-red); }

        .mapping-panel { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 1.05rem; }
        .select-custom { width: 100%; padding: 14px 16px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 1rem; font-weight: 500; outline: none; background: #f9fafb; cursor: pointer; }
        .select-custom:focus { border-color: var(--primary-red); }

        .cpmk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 15px; }
        .cpmk-card { border: 1px solid #e5e7eb; padding: 15px; border-radius: 8px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: 0.2s; background: white; }
        .cpmk-card:hover { border-color: var(--primary-red); background: #fff5f5; }
        .cpmk-card input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin-top: 2px; accent-color: var(--primary-red); }
        .cpmk-info { display: flex; flex-direction: column; }
        .cpmk-code { font-weight: 700; font-size: 0.95rem; color: var(--text-dark); }
        .cpmk-desc { font-size: 0.8rem; color: #6b7280; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .btn-save { background: var(--primary-red); color: white; border: none; padding: 14px 24px; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; width: 100%; justify-content: center; margin-top: 30px; }
        .btn-save:hover { background: #6b0000; transform: translateY(-2px); }
        .btn-save:disabled { background: #d1d5db; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="header-container">
            <div>
                <div class="header-subtitle">PEMETAAN (MAPPING)</div>
                <h1 class="header-title">MAPPING <span>CPL - CPMK</span></h1>
            </div>
        </div>

        <div class="mapping-panel">
            <!-- 1. Pilih CPL -->
            <div class="form-group">
                <label for="selectCpl"><i class="fas fa-graduation-cap" style="color: var(--primary-red); margin-right: 8px;"></i> Pilih CPL Tujuan</label>
                <select id="selectCpl" class="select-custom" onchange="loadMappingData()">
                    <option value="">-- Memuat daftar CPL... --</option>
                </select>
            </div>

            <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 30px 0;">

            <!-- 2. Pilih CPMK (Grouped) -->
            <div class="form-group">
                <label><i class="fas fa-list-check" style="color: var(--primary-red); margin-right: 8px;"></i> CPMK yang Mendukung CPL Ini</label>
                <div id="cpmkContainer" class="cpmk-grid">
                    <p style="grid-column: 1 / -1; color: #9ca3af; font-style: italic;">Memuat daftar CPMK...</p>
                </div>
            </div>

            <!-- 3. Tombol Simpan -->
            <button id="btnSave" class="btn-save" onclick="saveMapping()" disabled>
                <i class="fas fa-save"></i> Simpan Relasi
            </button>
        </div>
    </div>

<script>
    const API_BASE = "https://playing-transactions-discovered-welfare.trycloudflare.com/webhook";
    const API_METADATA = `${API_BASE}/get-metadata`;
    const API_UPDATE = `${API_BASE}/admin-update-master`; // Jalur 'mapping' di n8n

    let allMetadata = [];

    window.onload = async () => {
        if (!localStorage.getItem("user_login")) { window.location.replace("/login/login.html"); return; }
        await loadSidebar();
        await initData();
    };

    // Tarik data CPL dan CPMK sekaligus
    async function initData() {
    try {
        const res = await fetch(API_METADATA);
        allMetadata = await res.json();

        const selectCpl = document.getElementById('selectCpl');
        selectCpl.innerHTML = '<option value="">-- Pilih CPL --</option>';
        
        // Sesuaikan dengan nama kolom CPL di metadata
        allMetadata.filter(i => i.tipe === 'cpl').forEach(cpl => {
            // Kita gunakan cpl.kode_cpl (atau cpl.kode jika sudah di-alias di N8N)
            const kodeCpl = cpl.kode_cpl || cpl.kode; 
            selectCpl.innerHTML += `<option value="${kodeCpl}">${kodeCpl} - ${cpl.label || cpl.deskripsi}</option>`;
        });

            renderCpmkGroups();
        } catch (error) { console.error("Error initData:", error); }
    }

    // Gambar Checkbox CPMK dengan Header Rumpun
    function renderCpmkGroups() {
        const container = document.getElementById('cpmkContainer');
        container.innerHTML = '';
        
        // Filter tipe cpmk dan urutkan berdasarkan kode_cpmk
        const dataCpmk = allMetadata.filter(i => i.tipe === 'cpmk').sort((a,b) => 
            (a.kode_cpmk || a.kode).localeCompare(b.kode_cpmk || b.kode)
        );
        
        const grouped = {};
        dataCpmk.forEach(cpmk => {
            const kCPMK = cpmk.kode_cpmk || cpmk.kode; //
            const prefix = kCPMK.substring(0, kCPMK.length - 1);
            if (!grouped[prefix]) grouped[prefix] = [];
            grouped[prefix].push(cpmk);
        });

        for (const [prefix, list] of Object.entries(grouped)) {
            container.innerHTML += `<div style="grid-column:1/-1; margin-top:15px; border-bottom:2px solid #e5e7eb; padding-bottom:5px;"><h4 style="color:var(--text-dark); font-weight:800;">${prefix}x</h4></div>`;
            list.forEach(cpmk => {
                const kCPMK = cpmk.kode_cpmk || cpmk.kode; // Ambil kode asli dari DB
                container.innerHTML += `
                    <label class="cpmk-card" for="cb-${kCPMK}">
                        <input type="checkbox" id="cb-${kCPMK}" class="cpmk-checkbox" value="${kCPMK}" disabled>
                        <div class="cpmk-info">
                            <span class="cpmk-code">${kCPMK}</span>
                            <span class="cpmk-desc">${cpmk.deskripsi || cpmk.label}</span>
                        </div>
                    </label>
                `;
            });
        }
    }

    // Jalankan saat CPL di dropdown dipilih
    function loadMappingData() {
        const cplId = document.getElementById('selectCpl').value; // Contoh: "TI-CPL01"
        const checkboxes = document.querySelectorAll('.cpmk-checkbox');
        const btnSave = document.getElementById('btnSave');

        checkboxes.forEach(cb => {
            cb.checked = false;
            cb.disabled = !cplId;
            
            // Cari data di metadata yang kode_cpmk-nya cocok dengan checkbox ini[cite: 2]
            const originalData = allMetadata.find(m => (m.kode_cpmk || m.kode) === cb.value);
            
            // Cek apakah kode_cpl_ref di database sama dengan CPL yang dipilih di dropdown[cite: 2]
            if (cplId && originalData && originalData.kode_cpl_ref === cplId) {
                cb.checked = true;
            }
        });
        btnSave.disabled = !cplId;
    }

    // Simpan relasi satu per satu ke MySQL lewat n8n[cite: 2]
    async function saveMapping() {
        const cplId = document.getElementById('selectCpl').value;
        const btnSave = document.getElementById('btnSave');
        const selectedCpmk = Array.from(document.querySelectorAll('.cpmk-checkbox:checked')).map(cb => cb.value);

        btnSave.disabled = true;
        btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

        try {
            // Kita loop setiap CPMK yang dipilih untuk diupdate kolom kode_cpl_ref nya[cite: 2]
            for (const cpmkId of selectedCpmk) {
                await fetch(API_UPDATE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tipe: 'mapping', 
                        kode: cpmkId, 
                        value: cplId 
                    })
                });
            }
            alert("✅ Pemetaan CPL - CPMK Berhasil!");
            location.reload(); 
        } catch (e) { alert("Terjadi kesalahan jaringan."); }
        finally { 
            btnSave.disabled = false; 
            btnSave.innerHTML = '<i class="fas fa-save"></i> Simpan Relasi'; 
        }
    }

    // Fungsi Standar Sidebar & Dropdown
    async function loadSidebar() {
        const response = await fetch('/kaprodi/kaprodi_ti/components/sidebar.html');
        document.getElementById('sidebar-container').innerHTML = await response.text();
        document.getElementById("adminName").innerText = localStorage.getItem("user_login") || "Admin";
        document.getElementById('nav-mapping-cpl-cpmk').style.background = 'var(--sidebar-hover)';
    }

    function toggleDropdown(m, c) {
        const menu = document.getElementById(m), chev = document.getElementById(c);
        if (menu.style.display === 'none' || menu.style.display === '') {
            menu.style.display = 'flex'; chev.style.transform = 'rotate(180deg)';
        } else {
            menu.style.display = 'none'; chev.style.transform = 'rotate(0deg)';
        }
    }
</script>
</body>
</html>
