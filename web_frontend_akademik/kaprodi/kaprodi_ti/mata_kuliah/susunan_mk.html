<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Mata Kuliah - Sistem OBE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CSS STYLING UTAMA --- */
        :root { 
            --sidebar-bg: #161923; 
            --sidebar-text: #7b8395;
            --sidebar-hover: #262936;
            --sidebar-active-text: #ffffff;
            --primary-red: #8b0000; 
            --bg-main: #ffffff; 
            --text-dark: #111827;
            --border-dark: #161923;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { display: flex; background: var(--bg-main); height: 100vh; overflow: hidden; color: var(--text-dark); }
        /* --- ✨ EFEK SMOOTH TRANSITION ✨ --- */
      /* --- ✨ EFEK SMOOTH TRANSITION ✨ --- */
        body { 
            animation: transitionIn 0.3s ease-in-out; 
        }
        
        @keyframes transitionIn {
            from { 
                opacity: 0; 
                transform: translateY(8px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        
        /* GAYA SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; padding: 24px 16px; }
        .sidebar-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; padding: 0 10px; }
        .sidebar-profile img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .sidebar-profile-info { display: flex; flex-direction: column; }
        .sidebar-profile-info .name { color: white; font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
        .sidebar-profile-info .role { color: var(--sidebar-text); font-size: 9px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
        .sidebar-divider { height: 1px; background-color: rgba(255, 255, 255, 0.08); margin: 5px 10px 10px 10px; }
        .nav-menu { flex: 1; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .nav-menu::-webkit-scrollbar { display: none; }
        .menu-category { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; color: var(--sidebar-text); text-transform: uppercase; margin: 10px 0 10px 10px; }
        .nav-item { padding: 12px 16px; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: all 0.2s; border-radius: 8px; font-weight: 500; font-size: 0.80rem; }
        .nav-item:hover, .nav-item.active { background: var(--sidebar-hover); color: var(--sidebar-active-text); }
        .nav-item i { font-size: 1.1rem; width: 20px; text-align: center; }
        .nav-bottom { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .nav-item.logout { color: #f87171; }
        .nav-item.logout:hover { background: rgba(248, 113, 113, 0.1); }

        /* GAYA MAIN CONTENT & TABEL */
        .main-content { flex: 1; overflow-y: auto; padding: 40px 60px; background-color: var(--bg-main); }
        .header-container { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; border-bottom: 1px solid #e5e7eb; padding-bottom: 20px; }
        .header-title-area { display: flex; flex-direction: column; }
        .header-subtitle { color: #9ca3af; font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
        .header-title { font-size: 2.2rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; }
        .header-title span { color: var(--primary-red); }
        .badge-prodi { background: var(--primary-red); color: white; padding: 10px 20px; border-radius: 30px; font-size: 0.9rem; font-weight: 600; }
        .btn-dark { background: var(--border-dark); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-dark:hover { background: #000000; transform: translateY(-2px); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; border: 1.5px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
        th { background: #f3f4f6; color: var(--text-dark); padding: 14px 16px; text-align: left; border-bottom: 2px solid #e5e7eb; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; }
        td { padding: 14px 16px; border-bottom: 1px solid #e5e7eb; font-size: 0.95rem; }
        tbody tr:hover { background-color: #f9fafb; }
    </style>
</head>
<body>

    <!-- ✨ TEMPAT SIDEBAR OTOMATIS MUNCUL ✨ -->
    <div id="sidebar-container"></div>

    <div class="main-content">
        <!-- HEADER HALAMAN -->
        <div class="header-container">
            <div class="header-title-area">
                <div class="header-subtitle">KELOLA KURIKULUM</div>
                <h1 class="header-title">KELOLA MATA <span>KULIAH</span></h1>
            </div>
            <div class="badge-prodi">Teknik Informatika</div>
        </div>

        <!-- AREA TABEL MATA KULIAH -->
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <div>
                    <h3 style="margin: 0; font-size: 1.4rem; font-weight: 800;">Susunan Mata Kuliah</h3>
                    <p style="margin: 4px 0 0 0; color: #9ca3af; font-size: 0.95rem; font-weight: 500;">Menampilkan Daftar Mata Kuliah Terstruktur</p>
                </div>
                <button class="btn-dark" onclick="loadData()"><i class="fas fa-sync-alt"></i> Refresh Data</button>
            </div>
            
            <!-- Kontainer ini akan menampung tabel-tabel per semester secara otomatis -->
            <div id="container-tabel-semester"></div>
        </div>
    </div>

<script>
    // 1. KONFIGURASI API
    const PRODI = 'ti'; 
    const API_BASE = "https://playing-transactions-discovered-welfare.trycloudflare.com/webhook"; 
    const API_MATKUL = `${API_BASE}/get-susunan-matkul?prodi=${PRODI}`;
    const API_UPDATE = `${API_BASE}/admin-update-master`;
    const userLogin = localStorage.getItem("user_login");

    // 2. FUNGSI LOAD SIDEBAR (DIPERBAIKI)
    async function loadSidebar() {
        try {
            const response = await fetch('/kaprodi/kaprodi_ti/components/sidebar.html');
            if (!response.ok) throw new Error("File sidebar tidak ditemukan");
            const html = await response.text();
            
            const container = document.getElementById('sidebar-container');
            if (container) {
                container.innerHTML = html; // Pakai innerHTML agar div pembungkus tidak hilang
                
                // Masukkan nama admin dari localStorage ke sidebar barumu
                const nameElem = document.getElementById("adminName");
                if (nameElem) nameElem.innerText = localStorage.getItem("user_login") || "Admin";
                
                // Tandai menu Mata Kuliah sedang aktif
                const navMk = document.getElementById('nav-mk');
                if (navMk) navMk.classList.add('active');
            }
            } catch (error) {
                console.error('Gagal memuat sidebar:', error);
                // Jika Fetch gagal (CORS), sidebar tidak akan muncul.
            }
    }

    // 3. FUNGSI LOAD DATA MATKUL PER SEMESTER
    async function loadData() { 
        const container = document.getElementById('container-tabel-semester');
        if (!container) return;
        
        container.innerHTML = "<p style='text-align:center; padding:20px;'>Memuat data dari database...</p>";

        try {
            const res = await fetch(API_MATKUL); 
            const data = await res.json(); 
            
            container.innerHTML = "";

            // Kelompokkan data berdasarkan semester[cite: 35]
            const perSemester = data.reduce((acc, item) => {
                if (!acc[item.semester]) acc[item.semester] = [];
                acc[item.semester].push(item);
                return acc;
            }, {});

            // Urutkan semester dan render tabelnya
            Object.keys(perSemester).sort().forEach(sem => {
                let tableHTML = `
                    <div style="margin-bottom: 40px;">
                        <h4 style="margin-bottom: 15px; font-size: 1.1rem; color: var(--primary-red); font-weight: 700;">
                            <i class="fas fa-graduation-cap"></i> SEMESTER ${sem}
                        </h4>
                        <table>
                            <thead>
                                <tr>
                                    <th width="20%">Kode MK</th>
                                    <th>Nama Mata Kuliah</th>
                                    <th width="15%" style="text-align: center;">SKS</th>
                                    <th width="15%" style="text-align: center;">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>`;

                perSemester[sem].forEach(mk => {
                    tableHTML += `
                        <tr>
                            <td><strong>${mk.kode_mk}</strong></td>
                            <td>
                                <input type="text" id="in-${mk.kode_mk}" value="${mk.nama_mk}" style="width:100%; padding:8px; border:1px solid #e5e7eb; border-radius:6px;">
                            </td>
                            <td style="text-align: center;">
                                <input type="number" id="sks-${mk.kode_mk}" value="${mk.sks}" style="width:60px; padding:8px; border:1px solid #e5e7eb; border-radius:6px; text-align:center;" min="1" max="6">
                            </td>
                            <td style="text-align:center;">
                                <button class="btn-dark" style="padding: 8px 12px;" onclick="simpanEdit('mk', '${mk.kode_mk}')">
                                    <i class="fas fa-save"></i>
                                </button>
                            </td>
                        </tr>`;
                });

                tableHTML += `</tbody></table></div>`;
                container.innerHTML += tableHTML;
            });

        } catch(e) { 
            container.innerHTML = "<p style='color:red; text-align:center;'>Gagal menarik data. Cek koneksi n8n.</p>";
        }
    }


    // 4. SATU-SATUNYA WINDOW ONLOAD (PENTING!)
    window.onload = async () => {
        // Pastikan user sudah login
        if (!userLogin) {
            window.location.replace("../login/login.html");
            return;
        }
        
        await loadSidebar(); // Tunggu sidebar selesai
        await loadData('mk');    // Baru muat data
    };

    // Fungsi simpan tetap sama
    // 4. FUNGSI SIMPAN EDIT (UBAH NAMA DAN SKS)
    async function simpanEdit(tipe, kode) { 
        // Ambil nilai dari input Nama MK dan input SKS
        const value = document.getElementById(`in-${kode}`).value; 
        const sksBaru = document.getElementById(`sks-${kode}`).value;
        
        // Opsional: Ubah ikon tombol jadi loading
        const btn = event.currentTarget;
        const oldHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        btn.disabled = true;

        try {
            const res = await fetch(API_UPDATE, { 
                method: "POST", 
                headers: {"Content-Type":"application/json"}, 
                // Kirimkan SKS di dalam body agar ditangkap oleh webhook N8n
                body: JSON.stringify({ 
                    tipe: tipe, 
                    kode: kode, 
                    value: value, 
                    sks: parseInt(sksBaru), 
                    prodi: PRODI 
                }) 
            }); 
            
            if(res.ok) {
                alert("✅ Data Mata Kuliah & SKS Berhasil Diperbarui!");
            } else {
                alert("❌ Gagal menyimpan data di server.");
            }
        } catch (e) { 
            alert("Terjadi kesalahan jaringan."); 
        } finally {
            // Kembalikan tombol ke bentuk semula
            btn.innerHTML = oldHtml;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
